<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成都好吃嘴儿大全 🌶️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c0392b;
    --red-light: #f8edec;
    --red-dark: #922b21;
    --orange: #d35400;
    --gold: #b7950b;
    --bg: #faf8f5;
    --card-bg: #ffffff;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e8e0d5;
    --tag-bg: #f5ede8;
    --nav-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--red);
    background-image:
      radial-gradient(circle at 20% 50%, rgba(192,57,43,0.8) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(180,50,30,0.9) 0%, transparent 40%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color: white;
    padding: 3rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '🌶️';
    position: absolute;
    font-size: 200px;
    opacity: 0.06;
    top: -40px; left: -30px;
    transform: rotate(-15deg);
    pointer-events: none;
  }
  .hero::after {
    content: '🍜';
    position: absolute;
    font-size: 150px;
    opacity: 0.06;
    bottom: -20px; right: -20px;
    transform: rotate(10deg);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(2rem, 6vw, 3.5rem);
    letter-spacing: 0.05em;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    margin-bottom: 0.5rem;
    position: relative;
  }

  .hero-sub {
    font-size: 0.95rem;
    opacity: 0.85;
    margin-bottom: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.08em;
  }

  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2rem;
    display: block;
    line-height: 1;
  }

  .stat-label {
    font-size: 0.75rem;
    opacity: 0.75;
    letter-spacing: 0.1em;
  }

  /* ── STICKY NAVBAR — auto-hide on scroll down, show on scroll up ── */
  .controls {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transform: translateY(0);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    will-change: transform;
  }

  /* collapsed state: slide up out of view */
  .controls.nav-hidden {
    transform: translateY(-100%);
    box-shadow: none;
  }

  /* when search is focused, always show regardless */
  .controls.search-focused {
    transform: translateY(0) !important;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
  }

  .controls-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }

  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    pointer-events: none;
  }

  #search {
    width: 100%;
    padding: 0.55rem 0.75rem 0.55rem 2.2rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: border-color 0.2s;
  }

  #search:focus {
    outline: none;
    border-color: var(--red);
    background: white;
  }

  /* ── CATEGORY FILTER PILLS ── */
  .filters {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 0.38rem 0.85rem;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--red); color: var(--red); }
  .filter-btn.active { background: var(--red); border-color: var(--red); color: white; }

  /* ── CITY TABS ── */
  .city-tabs {
    max-width: 1100px;
    margin: 1.25rem auto 0;
    padding: 0 1.5rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .city-tab {
    padding: 0.45rem 1.1rem;
    border-radius: 8px 8px 0 0;
    border: 1.5px solid var(--border);
    border-bottom: none;
    background: white;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans SC', sans-serif;
    color: var(--text-muted);
  }

  .city-tab.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
    font-weight: 500;
  }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem 3rem;
  }

  .section { margin-bottom: 2.5rem; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 0 0.75rem;
    border-bottom: 2px solid var(--border);
    margin-bottom: 1rem;
  }

  .section-icon { font-size: 1.5rem; }

  .section-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text);
  }

  .section-count {
    margin-left: auto;
    font-size: 0.8rem;
    color: var(--text-muted);
    background: var(--tag-bg);
    padding: 2px 10px;
    border-radius: 12px;
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, var(--red));
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  }

  .card-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 0.4rem;
    line-height: 1.4;
  }

  .card-feature {
    font-size: 0.82rem;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 0.6rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }

  .tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 12px;
    background: var(--tag-bg);
    color: var(--red-dark);
    font-weight: 500;
  }

  .tag.price {
    background: #fff8e1;
    color: #7d6608;
  }

  .card-address {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 0.6rem;
    display: flex;
    gap: 0.3rem;
    align-items: flex-start;
    line-height: 1.5;
  }

  .card-address::before {
    content: '📍';
    font-size: 0.75rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .card-notes {
    font-size: 0.75rem;
    color: #888;
    margin-top: 0.4rem;
    line-height: 1.5;
    font-style: italic;
  }

  .recommended::after {
    content: '⭐ 特别推荐';
    position: absolute;
    top: 10px; right: 10px;
    font-size: 0.65rem;
    background: #fff3cd;
    color: #7d6608;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  /* ── FLOATING "回到顶部 + 显示菜单" 按钮 ── */
  .fab-wrap {
    position: fixed;
    bottom: 1.5rem;
    right: 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 300;
  }

  .fab {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--red);
    color: white;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 3px 12px rgba(192,57,43,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s, transform 0.2s;
    opacity: 0;
    pointer-events: none;
  }

  .fab.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .fab:active { transform: scale(0.92); }

  /* ── RESULT COUNT ── */
  .result-info {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0.75rem 1.5rem 0;
    font-size: 0.82rem;
    color: var(--text-muted);
  }

  /* ── LOADING ── */
  .loading {
    text-align: center;
    padding: 5rem 2rem;
    color: var(--text-muted);
    font-size: 1.1rem;
  }

  /* ── EMPTY ── */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .empty-emoji { font-size: 3rem; margin-bottom: 1rem; }
  .empty p { font-size: 0.95rem; }

  /* ── FOOTER ── */
  footer {
    background: #2c1810;
    color: rgba(255,255,255,0.7);
    text-align: center;
    padding: 2rem;
    font-size: 0.8rem;
    line-height: 2;
  }
  footer strong { color: rgba(255,255,255,0.9); }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    .hero { padding: 2rem 1rem 1.5rem; }
    .cards-grid { grid-template-columns: 1fr; }
    .controls { padding: 0.6rem 1rem; }
    .city-tabs { padding: 0 1rem; }
    main { padding: 0 1rem 2rem; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="hero">
  <h1>成都好吃嘴儿大全 🌶️</h1>
  <p class="hero-sub">亲历探店 · 真实推荐 · 不定时更新</p>
  <div class="stats">
    <div class="stat">
      <span class="stat-num" id="total-count">–</span>
      <span class="stat-label">家餐厅</span>
    </div>
    <div class="stat">
      <span class="stat-num">3</span>
      <span class="stat-label">座城市</span>
    </div>
    <div class="stat">
      <span class="stat-num">10</span>
      <span class="stat-label">个分类</span>
    </div>
  </div>
</header>

<div class="controls" id="controls">
  <div class="controls-inner">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="搜索餐厅名、菜品、地址…" autocomplete="off">
    </div>
    <div class="filters" id="cat-filters">
      <button class="filter-btn active" data-cat="all">全部</button>
    </div>
  </div>
</div>

<div class="city-tabs" id="city-tabs">
  <button class="city-tab active" data-city="all">🗺️ 全部城市</button>
  <button class="city-tab" data-city="成都">🏙️ 成都</button>
  <button class="city-tab" data-city="乐山">🏔️ 乐山</button>
  <button class="city-tab" data-city="宜宾">🍃 宜宾</button>
</div>

<div class="result-info" id="result-info"></div>
<main id="main-content"><div class="loading">🌶️ 正在加载美食数据…</div></main>

<footer>
  <strong>成都好吃嘴儿大全</strong><br>
  纯属吃货个人爱好 · 无任何商业目的 · 每一家都是本人亲自去过的<br>
  🌶️ 辣不怕，怕不辣，不辣不欢 🌶️
</footer>

<!-- 浮动按钮：显示菜单 + 回顶部 -->
<div class="fab-wrap">
  <button class="fab" id="fab-menu" title="显示筛选菜单" onclick="showNav()">☰</button>
  <button class="fab" id="fab-top" title="回到顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</div>

<script>
const CATEGORY_CONFIG = {
  '川菜&私房菜':   { icon: '🍜', color: '#c0392b' },
  '火锅&鱼&鸡':   { icon: '🍲', color: '#e67e22' },
  '串串￥钵钵鸡': { icon: '🍢', color: '#d35400' },
  '冒菜':          { icon: '🥘', color: '#8e44ad' },
  '烤肉&烧烤':    { icon: '🔥', color: '#2c3e50' },
  '面小吃甜品':   { icon: '🍡', color: '#16a085' },
  '成都特色茶馆': { icon: '🍵', color: '#27ae60' },
  '酒吧':          { icon: '🍸', color: '#2980b9' },
  '乐山精选':      { icon: '🏔️', color: '#e74c3c' },
  '宜宾烧烤精选': { icon: '🍖', color: '#f39c12' },
};
const CATEGORIES_ORDER = Object.keys(CATEGORY_CONFIG);

let RESTAURANTS = [];
let currentCity = 'all';
let currentCat  = 'all';
let searchQuery = '';

// ── Auto-hide navbar on scroll ──────────────────────────────────────────────
const nav      = document.getElementById('controls');
const fabMenu  = document.getElementById('fab-menu');
const fabTop   = document.getElementById('fab-top');
const searchEl = document.getElementById('search');

let lastScrollY = 0;
let navHidden   = false;
let ticking     = false;

function handleScroll() {
  if (!ticking) {
    requestAnimationFrame(() => {
      const y = window.scrollY;
      const delta = y - lastScrollY;

      // Show/hide top button
      if (y > 300) fabTop.classList.add('visible');
      else         fabTop.classList.remove('visible');

      // Decide nav visibility (only after scrolling past hero ~250px)
      if (y > 200) {
        if (delta > 4 && !navHidden) {
          // scrolling DOWN → hide nav
          nav.classList.add('nav-hidden');
          navHidden = true;
          fabMenu.classList.add('visible');
        } else if (delta < -4 && navHidden) {
          // scrolling UP → show nav
          nav.classList.remove('nav-hidden');
          navHidden = false;
          fabMenu.classList.remove('visible');
        }
      } else {
        // Near top: always show nav, hide FAB
        nav.classList.remove('nav-hidden');
        navHidden = false;
        fabMenu.classList.remove('visible');
      }

      lastScrollY = y;
      ticking = false;
    });
    ticking = true;
  }
}

window.addEventListener('scroll', handleScroll, { passive: true });

// Keep nav visible while search is focused
searchEl.addEventListener('focus', () => {
  nav.classList.add('search-focused');
  nav.classList.remove('nav-hidden');
});
searchEl.addEventListener('blur', () => {
  nav.classList.remove('search-focused');
});

function showNav() {
  nav.classList.remove('nav-hidden');
  navHidden = false;
  fabMenu.classList.remove('visible');
  window.scrollBy({ top: -80, behavior: 'smooth' });
}

// ── Build category filter pills ──────────────────────────────────────────────
const catFilters = document.getElementById('cat-filters');
CATEGORIES_ORDER.forEach(cat => {
  const cfg = CATEGORY_CONFIG[cat];
  const btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.dataset.cat = cat;
  btn.textContent = cfg.icon + ' ' + cat;
  catFilters.appendChild(btn);
});

catFilters.addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

document.getElementById('city-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.city-tab');
  if (!btn) return;
  document.querySelectorAll('.city-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCity = btn.dataset.city;
  render();
});

searchEl.addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  render();
});

// ── Filter ────────────────────────────────────────────────────────────────────
function filterData() {
  return RESTAURANTS.filter(r => {
    if (currentCity !== 'all' && r.city !== currentCity) return false;
    if (currentCat  !== 'all' && r.category !== currentCat)  return false;
    if (searchQuery) {
      const q   = searchQuery.toLowerCase();
      const hay = (r.name + r.feature + r.address + r.notes + r.category).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function makeCard(r) {
  const cfg = CATEGORY_CONFIG[r.category] || { color: '#95a5a6' };
  const isRecommended = r.notes && r.notes.includes('特别推荐');
  const cleanName = r.name.replace(/\s*人均[\d\-~至到]+\s*/g, '').trim();

  let html = `<div class="card${isRecommended ? ' recommended' : ''}" style="--cat-color:${cfg.color}">`;
  html += `<div class="card-name">${escHtml(cleanName)}</div>`;
  if (r.feature) html += `<div class="card-feature">${escHtml(r.feature)}</div>`;
  html += `<div class="card-meta">`;
  if (r.price) html += `<span class="tag price">💰 ${escHtml(r.price)}</span>`;
  html += `<span class="tag">${CATEGORY_CONFIG[r.category]?.icon || ''} ${escHtml(r.category)}</span>`;
  if (r.city !== '成都') html += `<span class="tag">📍 ${escHtml(r.city)}</span>`;
  html += `</div>`;
  if (r.address) html += `<div class="card-address">${escHtml(r.address)}</div>`;
  if (r.notes && r.notes.length > 2) html += `<div class="card-notes">${escHtml(r.notes)}</div>`;
  html += `</div>`;
  return html;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const filtered    = filterData();
  const mainEl      = document.getElementById('main-content');
  const resultInfoEl = document.getElementById('result-info');

  resultInfoEl.textContent = (searchQuery || currentCat !== 'all' || currentCity !== 'all')
    ? `共找到 ${filtered.length} 家餐厅`
    : '';

  if (filtered.length === 0) {
    mainEl.innerHTML = `<div class="empty"><div class="empty-emoji">😢</div><p>没有找到相关餐厅，换个关键词试试~</p></div>`;
    document.getElementById('total-count').textContent = 0;
    return;
  }

  const grouped = {};
  filtered.forEach(r => {
    if (!grouped[r.category]) grouped[r.category] = [];
    grouped[r.category].push(r);
  });

  let html = '';
  CATEGORIES_ORDER.forEach(cat => {
    if (!grouped[cat] || grouped[cat].length === 0) return;
    const cfg = CATEGORY_CONFIG[cat];
    html += `<div class="section">
      <div class="section-header">
        <span class="section-icon">${cfg.icon}</span>
        <span class="section-title">${cat}</span>
        <span class="section-count">${grouped[cat].length} 家</span>
      </div>
      <div class="cards-grid">`;
    grouped[cat].forEach(r => { html += makeCard(r); });
    html += `</div></div>`;
  });

  mainEl.innerHTML = html;
  document.getElementById('total-count').textContent = filtered.length;
}

// ── Load data.json ────────────────────────────────────────────────────────────
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    RESTAURANTS = data;
    render();
  })
  .catch(() => {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><div class="empty-emoji">⚠️</div><p>数据加载失败，请检查 data.json 是否存在。</p></div>`;
  });
</script>
</body>
</html>
